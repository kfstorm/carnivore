name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            applications/telegram-bot/requirements.txt
            post-process/requirements.txt
            carnivore-lib/setup.cfg

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: carnivore-lib/carnivore/readability/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            -r requirements-dev.txt \
            -r applications/telegram-bot/requirements.txt \
            -r post-process/requirements.txt \
            -e carnivore-lib

      - name: Install Node.js dependencies
        working-directory: carnivore-lib/carnivore/readability
        run: npm ci

      - name: Install browser dependencies
        run: playwright install --with-deps chromium

      - name: Install pandoc
        uses: pandoc/actions/setup@v1
        with:
          version: "3.10"

      - name: Install monolith
        env:
          MONOLITH_VERSION: 2.10.1
        run: |
          curl -fsSL "https://github.com/Y2Z/monolith/releases/download/v${MONOLITH_VERSION}/monolith-gnu-linux-x86_64" -o /tmp/monolith
          sudo install -m 0755 /tmp/monolith /usr/local/bin/monolith

      - name: Run tests
        run: scripts/run-tests.sh
